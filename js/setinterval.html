        <h1>setInterval()</h1>
        <ul>
          <li>used to do things repeatedly at a set time</li>
          <li>returns value usually called interval ID</li>
          <li>this interval ID can (and must) be sent to <a href="clearinterval.html">clearInterval()</a> to stop the cycle</li>
